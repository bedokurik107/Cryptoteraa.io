<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Сердце из "I Love YOU"</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #2b0014 0%, #4a0020 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Montserrat', 'Poiret One', system-ui, -apple-system, 'Roboto', sans-serif;
            padding: 20px;
        }

        .heart-container {
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at 30% 20%, rgba(255,90,120,0.15), rgba(0,0,0,0) 70%);
            border-radius: 60px;
            padding: 20px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3), inset 0 1px 2px rgba(255,255,255,0.1);
        }

        canvas {
            display: block;
            margin: 0 auto;
            max-width: 100%;
            height: auto;
            border-radius: 40px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3), 0 0 0 2px rgba(255,200,220,0.2);
            transition: all 0.2s ease;
        }

        .info {
            text-align: center;
            margin-top: 30px;
            color: #ffc0d0;
            font-weight: 400;
            text-shadow: 0 2px 5px #5a0020;
            letter-spacing: 1px;
            background: rgba(0,0,0,0.3);
            display: inline-block;
            padding: 8px 24px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            font-size: 1rem;
        }

        .footer {
            position: fixed;
            bottom: 15px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 13px;
            color: #ff90aa;
            background: rgba(30,0,15,0.5);
            padding: 5px;
            font-family: monospace;
            pointer-events: none;
        }

        @media (max-width: 600px) {
            .info {
                font-size: 0.8rem;
                margin-top: 20px;
            }
            canvas {
                border-radius: 30px;
            }
        }
    </style>
</head>
<body>
<div style="display: flex; flex-direction: column; align-items: center;">
    <div class="heart-container">
        <canvas id="heartCanvas" width="600" height="600" style="width:100%; height:auto; max-width:600px; aspect-ratio:1/1"></canvas>
    </div>
    <div class="info">💖 Каждый пиксель — признание в любви 💖</div>
    <div class="footer">нажми на сердце — изменится стиль</div>
</div>

<script>
    (function() {
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        // Размер канваса чётко задан (600x600)
        canvas.width = 600;
        canvas.height = 600;

        // Фраза, из которой состоит сердце
        const LOVE_PHRASE = "I Love YOU";
        // Альтернативные слова для насыщенности (тоже внутри сердца)
        const ALT_PHRASE = "❤️ LOVE ❤️";

        // Параметры сердца (математическая формула)
        // Используем параметрическую форму сердца: x = 16 * sin(t)^3, y = 13cos(t) - 5 cos(2t) - 2cos(3t) - cos(4t)
        // Масштабируем и смещаем под размер холста 600x600

        const scale = 14.5;      // масштаб (чем больше, тем крупнее сердце)
        const offsetX = 300;
        const offsetY = 310;      // небольшое смещение вниз для центра

        // Функция получения координат точки сердца по углу t (0..2PI)
        function getHeartPoint(t) {
            // классическая формула сердца
            const xRaw = 16 * Math.pow(Math.sin(t), 3);
            const yRaw = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t);
            return { x: xRaw * scale, y: -yRaw * scale }; // -yRaw чтобы Y рос вверх
        }

        // Генерация набора точек для контура сердца (чтобы плотно заполнить)
        function generateHeartPoints(numPoints = 4200) {
            const points = [];
            for (let i = 0; i < numPoints; i++) {
                // Неравномерное распределение по длине, но для визуала сойдётся красиво
                const t = (i / numPoints) * Math.PI * 2;
                const p = getHeartPoint(t);
                points.push({
                    x: p.x + offsetX,
                    y: p.y + offsetY,
                    t: t
                });
            }
            return points;
        }

        // Дополнительно нужно создать массив точек для внутреннего заполнения/толщины
        // Чтобы сердце выглядело объёмным и состояло из множества надписей,
        // мы не просто рисуем контур, а генерируем растеризованное "облако" внутри сердца.
        // Самый зрелищный способ: залить область сердца множеством мелких "I Love YOU".
        // Сделаем это с помощью проверки попадания точки внутрь формы сердца (ray casting + упрощённая маска)

        // Функция проверки, находится ли точка внутри математического сердца (замкнутой области)
        function isInsideHeart(px, py) {
            // переводим в локальные координаты относительно центра сердца (от 0,0 где формула сердца)
            const localX = (px - offsetX) / scale;
            const localY = -(py - offsetY) / scale;   // инвертируем Y

            // Быстрый и точный метод: определим угловой диапазон и проверим кривую.
            // Используем то, что для фиксированного X ищем границы Y (метод трассировки).
            // Упрощённо: пройдём по параметру t и найдём пересечения.
            let intersections = 0;
            const tStep = Math.PI * 2 / 360;
            for (let t = 0; t < Math.PI * 2; t += tStep) {
                const p1 = getHeartPoint(t);
                const t2 = t + tStep;
                const p2 = getHeartPoint(t2);
                // Проверяем пересечение горизонтального луча (вправо) с отрезком (p1,p2)
                if ((p1.y > localY) !== (p2.y > localY) &&
                    (localX < (p2.x - p1.x) * (localY - p1.y) / (p2.y - p1.y) + p1.x)) {
                    intersections++;
                }
            }
            return (intersections % 2) === 1;
        }

        // Генерируем сетку точек внутри bounding box сердца, чтобы плотно покрыть область
        function generateDenseHeartPointsInside(step = 8) {
            // step — расстояние между точками в пикселях, чем меньше, тем больше надписей
            const pointsInside = [];
            // Bounding box сердца в экранных координатах
            const margin = 45;
            let minX = offsetX - 14 * scale;
            let maxX = offsetX + 14 * scale;
            let minY = offsetY - 17 * scale;
            let maxY = offsetY + 14 * scale;

            // Пройдём по всей области
            for (let y = minY; y <= maxY; y += step) {
                for (let x = minX; x <= maxX; x += step) {
                    if (isInsideHeart(x, y)) {
                        // Добавляем небольшую псевдо-случайную вариацию смещения для «живого» вида
                        const jitterX = (Math.sin(x * 0.02 + y * 0.03) * 1.2) | 0;
                        const jitterY = (Math.cos(y * 0.02 + x * 0.017) * 1.2) | 0;
                        pointsInside.push({
                            x: x + jitterX,
                            y: y + jitterY,
                        });
                    }
                }
            }
            return pointsInside;
        }

        // Стиль рендеринга: чередование фраз, оттенки красного, разные повороты
        let colorStyle = 0;   // 0 - тёплая красная градиентная, 1 - розовая с белыми акцентами, 2 - огненно-золотая

        function getTextColor(x, y, idx) {
            const heartDist = Math.hypot(x - offsetX, y - offsetY);
            const mixVal = (Math.sin(x * 0.03) * Math.cos(y * 0.03) + 1) / 2;
            if (colorStyle === 0) {
                const r = 220 + Math.floor(35 * Math.sin(x * 0.02 + idx * 0.01));
                const g = 70 + Math.floor(40 * Math.cos(y * 0.02));
                const b = 90 + Math.floor(30 * Math.sin(idx * 0.02));
                return `rgb(${r}, ${g}, ${b})`;
            } else if (colorStyle === 1) {
                const r = 255 - Math.floor(45 * mixVal);
                const g = 120 + Math.floor(80 * (Math.sin(x * 0.025) + 1) / 2);
                const b = 150 + Math.floor(70 * Math.cos(y * 0.02));
                return `rgb(${r}, ${g}, ${b})`;
            } else {
                const r = 255;
                const g = 100 + Math.floor(100 * Math.sin(x * 0.02 + y * 0.01));
                const b = 50 + Math.floor(60 * Math.cos(y * 0.025));
                return `rgb(${r}, ${g}, ${b})`;
            }
        }

        function getFontSize(x, y, idx) {
            // Размер шрифта 13px - 20px, в зависимости от удаления от центра, динамика
            const centerDist = Math.hypot(x - offsetX, y - offsetY);
            let size = 14 + Math.floor(5 * Math.sin(idx * 0.07) + 2 * Math.cos(y * 0.03));
            if (centerDist < 65) size += 3;
            if (centerDist > 130) size = Math.max(11, size - 2);
            return `${size}px`;
        }

        function getRotation(x, y) {
            // лёгкий наклон для красоты
            return (Math.sin(x * 0.012) * Math.cos(y * 0.012)) * 0.18;
        }

        // основная отрисовка
        let activePoints = [];
        let textCache = [];

        function buildHeartPoints() {
            // используем плотную сетку (шаг 9 пикселей - баланс между производительностью и плотностью)
            activePoints = generateDenseHeartPointsInside(9);
            // подготавливаем для каждого точки, какую надпись показать (основную или дополнительную)
            textCache = activePoints.map((p, i) => {
                const useAlt = (Math.floor(p.x * 0.023 + p.y * 0.017) % 3 === 0) || (i % 7 === 2);
                return useAlt ? ALT_PHRASE : LOVE_PHRASE;
            });
        }

        function drawHeart() {
            if (!ctx) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Лёгкий полупрозрачный фон - сияние
            ctx.save();
            
            // Рисуем каждую точку как текст
            for (let idx = 0; idx < activePoints.length; idx++) {
                const p = activePoints[idx];
                const phrase = textCache[idx];
                ctx.save();
                ctx.translate(p.x, p.y);
                const angle = getRotation(p.x, p.y);
                ctx.rotate(angle);
                ctx.font = `${getFontSize(p.x, p.y, idx)} "Segoe UI", "Montserrat", "Poiret One", system-ui, sans-serif`;
                ctx.fillStyle = getTextColor(p.x, p.y, idx);
                ctx.shadowBlur = 4;
                ctx.shadowColor = "rgba(0,0,0,0.4)";
                ctx.shadowOffsetX = 1;
                ctx.shadowOffsetY = 1;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(phrase, 0, 0);
                ctx.restore();
            }
            
            // Добавляем изящный контур сердца и блики поверх (эффект свечения)
            ctx.save();
            ctx.shadowBlur = 0;
            ctx.beginPath();
            // рисуем математический контур сердца полупрозрачной линией
            for (let t = 0; t <= Math.PI * 2; t += 0.05) {
                const point = getHeartPoint(t);
                const screenX = point.x + offsetX;
                const screenY = point.y + offsetY;
                if (t === 0) ctx.moveTo(screenX, screenY);
                else ctx.lineTo(screenX, screenY);
            }
            ctx.closePath();
            ctx.strokeStyle = "rgba(255, 180, 200, 0.7)";
            ctx.lineWidth = 2.2;
            ctx.stroke();
            ctx.restore();
            
            // Добавим искры или блеск в центре
            ctx.beginPath();
            ctx.arc(offsetX + 2, offsetY - 5, 8, 0, Math.PI*2);
            ctx.fillStyle = "rgba(255, 220, 160, 0.3)";
            ctx.fill();
        }
        
        function handleResizeAndRedraw() {
            drawHeart();
        }
        
        // смена стиля по клику на канвас
        function cycleColorStyle() {
            colorStyle = (colorStyle + 1) % 3;
            drawHeart();
        }
        
        // инициализация
        buildHeartPoints();
        drawHeart();
        
        // Перестройка при изменении ориентации экрана (не сбрасывает форму)
        window.addEventListener('resize', () => {
            setTimeout(() => drawHeart(), 20);
        });
        
        canvas.addEventListener('click', (e) => {
            cycleColorStyle();
            // небольшой эффект "пульса" при клике
            canvas.style.transform = 'scale(0.98)';
            setTimeout(() => { canvas.style.transform = ''; }, 130);
        });
        
        // дополнительный эффект при касании (мобильные)
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            cycleColorStyle();
            canvas.style.transform = 'scale(0.98)';
            setTimeout(() => { canvas.style.transform = ''; }, 130);
        });
        
        console.log("Сердце любви загружено! ❤️ I Love YOU ❤️");
    })();
</script>
</body>
</html>
